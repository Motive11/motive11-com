const canvas = document.getElementById("scene");
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });

renderer.setSize(window.innerWidth, window.innerHeight);

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x1E1E1F, 0.045);

const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.z = 8;

const particleCount = window.innerWidth < 640 ? 1000 : 2500;
const positions = new Float32Array(particleCount * 3);
const colors = new Float32Array(particleCount * 3);
const sizes = new Float32Array(particleCount);
const velocities = new Float32Array(particleCount * 3);

const orangeColor = new THREE.Color(0xd64916);
const whiteColor = new THREE.Color(0xF4F3EF);

for (let i = 0; i < particleCount; i++) {
  const i3 = i * 3;
  positions[i3]     = (Math.random() - 0.5) * 45;
  positions[i3 + 1] = (Math.random() - 0.5) * 30;
  positions[i3 + 2] = (Math.random() - 0.5) * 35 - 8;

  const isOrange = Math.random() < 0.05;
  const c = isOrange ? orangeColor : whiteColor;
  colors[i3]     = c.r;
  colors[i3 + 1] = c.g;
  colors[i3 + 2] = c.b;

  sizes[i] = isOrange ? 0.05 + Math.random() * 0.03 : 0.012 + Math.random() * 0.018;

  velocities[i3]     = (Math.random() - 0.5) * 0.0004;
  velocities[i3 + 1] = (Math.random() - 0.5) * 0.0004;
  velocities[i3 + 2] = (Math.random() - 0.5) * 0.0003;
}

const geometry = new THREE.BufferGeometry();
geometry.setAttribute("position", new THREE.BufferAttribute(positions, 3));
geometry.setAttribute("color", new THREE.BufferAttribute(colors, 3));
geometry.setAttribute("size", new THREE.BufferAttribute(sizes, 1));

const particleMaterial = new THREE.ShaderMaterial({
  uniforms: {},
  vertexShader: `
    attribute float size;
    varying vec3 vColor;
    void main() {
      vColor = color;
      vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
      gl_PointSize = size * (450.0 / -mvPosition.z);
      gl_Position = projectionMatrix * mvPosition;
    }
  `,
  fragmentShader: `
    varying vec3 vColor;
    void main() {
      vec2 xy = gl_PointCoord.xy - vec2(0.5);
      float r = length(xy);
      if (r > 0.5) discard;
      float alpha = smoothstep(0.5, 0.0, r);
      gl_FragColor = vec4(vColor, alpha * 0.55);
    }
  `,
  vertexColors: true,
  transparent: true,
  depthWrite: false,
  blending: THREE.AdditiveBlending
});

const particles = new THREE.Points(geometry, particleMaterial);
scene.add(particles);

const glowGeom = new THREE.PlaneGeometry(70, 45);
const glowMat = new THREE.ShaderMaterial({
  uniforms: { time: { value: 0 } },
  vertexShader: `
    varying vec2 vUv;
    void main() {
      vUv = uv;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }
  `,
  fragmentShader: `
    uniform float time;
    varying vec2 vUv;
    void main() {
      vec2 center = vec2(0.5 + sin(time * 0.08) * 0.2, 0.5 + cos(time * 0.06) * 0.12);
      float d = distance(vUv, center);
      float glow = smoothstep(0.6, 0.0, d) * 0.28;
      vec3 col = vec3(0.839, 0.286, 0.086) * glow;
      gl_FragColor = vec4(col, glow);
    }
  `,
  transparent: true,
  depthWrite: false,
  blending: THREE.AdditiveBlending
});
const glow = new THREE.Mesh(glowGeom, glowMat);
glow.position.z = -22;
scene.add(glow);

const clock = new THREE.Clock();
function animate() {
  const t = clock.getElapsedTime();
  const pos = geometry.attributes.position.array;

  for (let i = 0; i < particleCount; i++) {
    const i3 = i * 3;
    pos[i3]     += velocities[i3];
    pos[i3 + 1] += velocities[i3 + 1];
    pos[i3 + 2] += velocities[i3 + 2];

    if (pos[i3] > 22)  pos[i3] = -22;
    if (pos[i3] < -22) pos[i3] = 22;
    if (pos[i3 + 1] > 15)  pos[i3 + 1] = -15;
    if (pos[i3 + 1] < -15) pos[i3 + 1] = 15;
    if (pos[i3 + 2] > 18)  pos[i3 + 2] = -18;
    if (pos[i3 + 2] < -20) pos[i3 + 2] = 12;
  }
  geometry.attributes.position.needsUpdate = true;

  particles.rotation.y = t * 0.012;
  particles.rotation.x = Math.sin(t * 0.06) * 0.015;

  glowMat.uniforms.time.value = t;

  renderer.render(scene, camera);
  requestAnimationFrame(animate);
}

// ============ PAUSE STATE ============
let paused = false;
let pauseStartedAt = 0;
const pauseWaiters = new Set();

function togglePause() {
  if (paused) resume();
  else pause();
}

function pause() {
  if (paused) return;
  paused = true;
  pauseStartedAt = performance.now();
  pauseBtn.classList.add("paused");
  pauseBtn.setAttribute("aria-label", "Play");

  // Cancel every pending timer, keep remaining ms for resume
  for (const w of pauseWaiters) {
    clearTimeout(w.timerId);
    w.timerId = null;
    w.remaining = Math.max(0, w.fireAt - pauseStartedAt);
  }
}

function resume() {
  if (!paused) return;
  const pausedFor = performance.now() - pauseStartedAt;
  paused = false;
  pauseBtn.classList.remove("paused");
  pauseBtn.setAttribute("aria-label", "Pause");

  // Shift progress bar's elapsed-time anchor
  progressStart += pausedFor;

  // Re-schedule every waiter with its remaining time
  const now = performance.now();
  for (const w of pauseWaiters) {
    w.fireAt = now + w.remaining;
    w.timerId = setTimeout(w.fire, w.remaining);
  }

  if (progressRunning) requestAnimationFrame(tickProgress);
}

pauseBtn.addEventListener("click", togglePause);

function pausableSleep(ms) {
  return new Promise((resolve) => {
    const waiter = {
      fireAt: performance.now() + ms,
      remaining: ms,
      timerId: null,
      fire: () => {
        pauseWaiters.delete(waiter);
        resolve();
      }
    };
    pauseWaiters.add(waiter);
    if (!paused) {
      waiter.timerId = setTimeout(waiter.fire, ms);
    }
    // If paused, waiter just sits in the set; resume() will schedule it.
  });
}

function splitForReveal(html, mode) {
  const tmp = document.createElement("div");
  tmp.innerHTML = html;
  const output = document.createElement("div");

  function processNode(node, parent) {
    if (node.nodeType === Node.TEXT_NODE) {
      const text = node.nodeValue;
      if (mode === "word") {
        const parts = text.split(/(\s+)/);
        for (const p of parts) {
          if (p.length === 0) continue;
          if (/^\s+$/.test(p)) {
            parent.appendChild(document.createTextNode(p));
          } else {
            const span = document.createElement("span");
            span.className = "word";
            span.textContent = p;
            parent.appendChild(span);
          }
        }
      } else if (mode === "char") {
        for (const ch of text) {
          if (ch === " ") {
            parent.appendChild(document.createTextNode(" "));
          } else {
            const span = document.createElement("span");
            span.className = "char";
            span.textContent = ch;
            parent.appendChild(span);
          }
        }
      }
    } else if (node.nodeType === Node.ELEMENT_NODE) {
      if (node.tagName === "BR") {
        parent.appendChild(document.createElement("br"));
      } else {
        const clone = node.cloneNode(false);
        parent.appendChild(clone);
        for (const child of Array.from(node.childNodes)) {
          processNode(child, clone);
        }
      }
    }
  }

  for (const child of Array.from(tmp.childNodes)) {
    processNode(child, output);
  }

  return output;
}

function createSlide(slide, index) {
  const el = document.createElement("div");
  el.className = "slide"
    + (slide.isCTA ? " cta-slide" : "")
    + (slide.isGreeting ? " greeting-slide" : "");

  const inner = document.createElement("div");
  inner.className = "slide-inner";

  if (slide.isGreeting) {
    const img = document.createElement("img");
    img.className = "portrait";
    img.src = "/images/mark-szymanski.webp";
    img.alt = "Mark Szymanski";

    const text = document.createElement("div");
    text.className = "greeting-text";
    text.innerHTML = `
      <span class="line"><span class="word"><span class="wave">👋</span>Hey there.</span></span>
      <span class="line"><span class="word">I'm Mark Szymanski.</span></span>
    `;

    inner.appendChild(img);
    inner.appendChild(text);
    el.appendChild(inner);
    return el;
  }

  const big = document.createElement("div");
  big.className = "big" + (slide.weight ? " " + slide.weight : "");

  const revealContainer = splitForReveal(slide.html, slide.reveal);
  while (revealContainer.firstChild) {
    big.appendChild(revealContainer.firstChild);
  }

  inner.appendChild(big);
  el.appendChild(inner);
  return el;
}

async function revealSlide(slideEl, mode, speed) {
  const units = slideEl.querySelectorAll(mode === "word" ? ".word" : ".char");
  if (units.length === 0) return;
  for (let i = 0; i < units.length; i++) {
    units[i].classList.add("in");
    if (i < units.length - 1) await pausableSleep(speed);
  }
  await pausableSleep(300);
}

async function revealGreeting(slideEl) {
  const img = slideEl.querySelector(".portrait");
  const words = slideEl.querySelectorAll(".greeting-text .word");
  if (img) requestAnimationFrame(() => img.classList.add("in"));
  await pausableSleep(400);
  for (let i = 0; i < words.length; i++) {
    words[i].classList.add("in");
    if (i < words.length - 1) await pausableSleep(450);
  }
  await pausableSleep(400);
}

// All timing in the sequencer goes through pausableSleep
const sleep = pausableSleep;

function countRevealUnits(html, mode) {
  if (!html) return 0;
  const tmp = document.createElement("div");
  tmp.innerHTML = html;
  const text = tmp.textContent || "";
  if (mode === "word") {
    return text.trim().split(/\s+/).filter(Boolean).length;
  }
  return text.replace(/\s+/g, "").length;
}

function estimateSlideDuration(slide) {
  const PRE = 300;
  const REVEAL_BUFFER = 300;
  const FADE_OUT = 900;
  if (slide.isGreeting) {
    // 400ms initial delay + 2 lines × 450ms stagger + 400ms trailing buffer
    return PRE + 400 + 2 * 450 + 400 + slide.hold + FADE_OUT;
  }
  const units = countRevealUnits(slide.html, slide.reveal);
  const revealTime = Math.max(0, units - 1) * (slide.revealSpeed || 0);
  return PRE + revealTime + REVEAL_BUFFER + slide.hold + FADE_OUT;
}

let progressStart = 0;
let progressTotal = 0;
let progressRunning = false;

function tickProgress() {
  if (!progressRunning || paused) return;
  const elapsed = performance.now() - progressStart;
  const pct = Math.min(100, (elapsed / progressTotal) * 100);
  progressEl.style.width = pct + "%";
  if (pct < 100) requestAnimationFrame(tickProgress);
}

async function run() {
  // total runtime = everything up to the moment the CTA appears
  progressTotal = slides
    .filter(s => !s.isCTA)
    .reduce((sum, s) => sum + estimateSlideDuration(s), 0);
  // add the pre-run sleep and the CTA's pre-reveal/fade-in so the bar
  // finishes as the CTA text starts revealing
  progressTotal += 700 + 300;

  await sleep(700);

  progressStart = performance.now();
  progressRunning = true;
  requestAnimationFrame(tickProgress);

  for (let i = 0; i < slides.length; i++) {
    const slide = slides[i];
    const el = createSlide(slide, i);
    stage.appendChild(el);

    void el.offsetHeight;

    el.classList.add("active");

    await sleep(300);
    if (slide.isGreeting) {
      await revealGreeting(el);
    } else {
      await revealSlide(el, slide.reveal, slide.revealSpeed);
    }

    if (slide.isCTA) {
      progressRunning = false;
      progressEl.style.width = "100%";
      const link = el.querySelector(".cta-link");
      if (link) {
        setTimeout(() => link.classList.add("drawn"), 400);
      }
    }

    await sleep(slide.hold);

    if (!slide.isCTA) {
      el.classList.remove("active");
      await sleep(900);
      stage.removeChild(el);
    }
  }
}

run();
</script>
